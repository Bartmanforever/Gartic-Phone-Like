<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrum Phone - Mario Kart Edition</title>
    <style>
        :root {
            --mk-blue: #0055aa; --mk-yellow: #fff200; --mk-red: #ff0000;
            --mk-dark: #1a1a1a; --mk-white: #ffffff;
            --mk-gradient: linear-gradient(180deg, #0055aa 0%, #002244 100%);
        }

        body {
            font-family: 'Arial Black', sans-serif; background: var(--mk-gradient);
            background-attachment: fixed; color: var(--mk-white); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 200px;
        }

        #timer-container {
            position: sticky; top: 0; width: 100%; background: rgba(0, 0, 0, 0.85);
            border-bottom: 4px solid var(--mk-yellow); z-index: 1000; padding: 15px 0; text-align: center;
        }
        #timer-bar { width: 80%; height: 12px; background: #333; margin: 10px auto; border-radius: 20px; border: 2px solid var(--mk-white); overflow: hidden; }
        #timer-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--mk-red), var(--mk-yellow)); transition: width 1s linear; }
        #timer-display { font-size: 2.8rem; font-weight: 900; font-style: italic; text-shadow: 2px 2px 0 var(--mk-red); }
        #turn-counter { font-size: 1.2rem; color: var(--mk-yellow); margin-bottom: 5px; text-transform: uppercase; }

        .container {
            width: 90%; max-width: 850px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); padding: 2.5rem; border-radius: 20px; 
            border: 4px solid var(--mk-white); margin-top: 30px; text-align: center;
        }

        h1 { font-size: 3rem; font-style: italic; text-shadow: 4px 4px 0 var(--mk-blue); transform: skewX(-5deg); }
        .login-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 600px) { .login-grid { grid-template-columns: 1fr; } }
        
        .login-card { padding: 25px; border-radius: 15px; background: white; color: #000; border: 4px solid var(--mk-blue); }
        input { padding: 15px; border: 3px solid var(--mk-blue); border-radius: 10px; width: 85%; font-size: 1.1rem; font-weight: bold; margin: 10px 0; }
        
        button {
            padding: 15px 25px; border: none; border-radius: 50px; background: var(--mk-blue); color: white;
            font-weight: 900; font-style: italic; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 #003366; margin: 10px; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #003366; }
        button.btn-admin { background: var(--mk-red); box-shadow: 0 6px 0 #990000; }

        #canvas-container { background: #fff !important; border: 4px solid var(--mk-dark); border-radius: 15px; margin: 20px auto; width: 600px; height: 400px; overflow: hidden; touch-action: none; position: relative; }
        canvas { display: block; background: #fff; cursor: crosshair; touch-action: none; width: 600px; height: 400px; }
        .result-img { width: 100%; display: block; background: #fff; border-radius: 10px; }

        #persistent-admin-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--mk-yellow); color: #000;
            padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 5px solid white; z-index: 2000;
        }

        .hidden { display: none !important; }
        .toolbar { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; align-items: center; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .color-dot.active { border-color: #000; transform: scale(1.2); }
        
        .result-card { background: white; color: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: left; border-left: 10px solid var(--mk-blue); }
    </style>
</head>
<body>

    <div id="timer-container" class="hidden">
        <div id="turn-counter">TOUR 0 / 0</div>
        <div id="timer-display">--</div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <div class="container">
        <h1>SCRUM PHONE</h1>

        <div id="screen-login">
            <div class="login-grid">
                <div class="login-card">
                    <h2>🏁 JOUEUR</h2>
                    <input type="text" id="login-name" placeholder="TON PRÉNOM">
                    <button id="btn-player-join">REJOINDRE</button>
                </div>
                <div class="login-card" style="border-color: var(--mk-red);">
                    <h2>🏆 ADMIN</h2>
                    <input type="text" id="admin-name" placeholder="TON PRÉNOM">
                    <input type="password" id="admin-pass" placeholder="CODE">
                    <button id="btn-admin-join" class="btn-admin">HOST</button>
                </div>
            </div>
        </div>

        <div id="screen-lobby" class="hidden">
            <div id="player-list" style="font-size: 2rem; color: var(--mk-yellow); margin: 20px;"></div>
            <p>En attente du départ...</p>
        </div>

        <div id="screen-game" class="hidden">
            <h2 id="game-title" style="color: var(--mk-yellow)"></h2>
            <p id="game-instruction" style="font-size: 1.2rem; margin: 15px 0;"></p>
            
            <div id="zone-write" class="hidden">
                <input type="text" id="input-write" placeholder="Ton idée...">
                <br><button id="btn-submit-write">VALIDER</button>
            </div>

            <div id="zone-draw" class="hidden">
                <div id="canvas-container"><canvas id="paintCanvas" width="600" height="400"></canvas></div>
                <div class="toolbar">
                    <div id="palette" style="display: flex; gap: 8px;"></div>
                    <button onclick="setEraser()" style="background: #fff; color: #000; border: 1px solid #000; border-radius: 5px; padding: 8px;">🧼 GOMME</button>
                    <button onclick="clearCanvas()" style="background:#666; color:white; border-radius: 5px; padding: 8px;">EFFACER</button>
                </div>
                <button id="btn-submit-draw" style="background: var(--mk-red);">TERMINÉ !</button>
            </div>

            <div id="zone-guess" class="hidden">
                <div style="background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 4px solid var(--mk-blue);">
                    <img id="img-to-guess" class="result-img" src="">
                </div>
                <input type="text" id="input-guess" placeholder="Ta réponse...">
                <br><button id="btn-submit-guess">ENVOYER</button>
            </div>
        </div>

        <div id="screen-wait" class="hidden">
            <h2>BIEN JOUÉ !</h2>
            <p>Attente des autres joueurs...</p>
            <div style="font-size: 4rem;">🏎️💨</div>
        </div>

        <div id="screen-results" class="hidden">
            <h2>🏆 RÉSULTATS 🏆</h2>
            <div id="results-gallery"></div>
        </div>
    </div>

    <div id="persistent-admin-panel" class="hidden">
        TEMPS: <input type="number" id="cfg-timer" value="60" style="width:50px;">
        <button id="btn-start-game" class="btn-admin">START !</button>
        <button id="btn-reset-all" style="background:#000; color:white;">RESET TOTAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxZY1l6bfC7rXO02JtOwuauGviNSTkhYA",
            authDomain: "telephone-arabe.firebaseapp.com",
            databaseURL: "https://telephone-arabe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "telephone-arabe",
            appId: "1:227254624373:web:fa1542bc7551a1083fd83c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = 'u' + Math.floor(Math.random() * 1000000);
        let myName = "", isAdmin = false, players = [], currentStep = -1;

        function showScreen(id) {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('btn-player-join').onclick = () => {
            const n = document.getElementById('login-name').value;
            if(n) join(n, false);
        };
        document.getElementById('btn-admin-join').onclick = () => {
            const n = document.getElementById('admin-name').value;
            if(n && document.getElementById('admin-pass').value === "admin") join(n, true);
        };

        function join(name, adm) {
            myName = name; isAdmin = adm;
            set(ref(db, `scrum_phone/players/${myId}`), { name, isAdmin: adm });
            onDisconnect(ref(db, `scrum_phone/players/${myId}`)).remove();
            if(adm) document.getElementById('persistent-admin-panel').classList.remove('hidden');
            showScreen('screen-lobby');
        }

        onValue(ref(db, 'scrum_phone'), (snap) => {
            const data = snap.val();
            if(!data) return;
            players = data.players ? Object.keys(data.players) : [];
            document.getElementById('player-list').innerText = data.players ? Object.values(data.players).map(p => p.name).join(" • ") : "";

            if(data.state === "PLAYING") {
                const newStep = data.step || 0;
                const myIdx = players.indexOf(myId);
                const bookOwnerIdx = (myIdx - newStep + players.length) % players.length;
                const bookOwnerId = players[bookOwnerIdx];

                if (newStep !== currentStep) {
                    currentStep = newStep;
                    clearCanvas();
                    document.getElementById('input-write').value = "";
                    document.getElementById('input-guess').value = "";
                    document.getElementById('turn-counter').innerText = `TOUR ${currentStep + 1} / ${players.length}`;
                }

                if(isAdmin) {
                    const books = data.books || {};
                    let finishedCount = 0;
                    players.forEach(pId => { 
                        const pIdx = players.indexOf(pId);
                        const bId = players[(pIdx - currentStep + players.length) % players.length];
                        if(books[bId] && books[bId]['step'+currentStep]) finishedCount++; 
                    });
                    if(finishedCount >= players.length && finishedCount > 0) {
                        const ns = currentStep + 1;
                        if(ns >= players.length) update(ref(db, 'scrum_phone'), { state: "RESULTS", timer: -1 });
                        else update(ref(db, 'scrum_phone'), { step: ns, timer: parseInt(document.getElementById('cfg-timer').value) });
                    }
                }

                if(data.books && data.books[bookOwnerId] && data.books[bookOwnerId]['step'+currentStep]) {
                    showScreen('screen-wait');
                } else {
                    handleStepUI(data.books, bookOwnerId);
                }
            } else if(data.state === "RESULTS") {
                renderResults(data.books, data.players);
            } else if(data.state === "LOBBY" && myName) {
                showScreen('screen-lobby');
            }

            const tc = document.getElementById('timer-container');
            if(data.timer >= 0 && data.state === "PLAYING") {
                tc.classList.remove('hidden');
                document.getElementById('timer-display').innerText = data.timer + "s";
                document.getElementById('timer-progress').style.width = (data.timer / data.maxTime * 100) + "%";
            } else tc.classList.add('hidden');
        });

        function handleStepUI(books, bookOwnerId) {
            showScreen('screen-game');
            const title = document.getElementById('game-title');
            const inst = document.getElementById('game-instruction');
            document.getElementById('zone-write').classList.add('hidden');
            document.getElementById('zone-draw').classList.add('hidden');
            document.getElementById('zone-guess').classList.add('hidden');

            if(currentStep === 0) {
                title.innerText = "TOUR 1 : L'IDÉE";
                inst.innerText = "Écris une phrase rigolote !";
                document.getElementById('zone-write').classList.remove('hidden');
            } else {
                // On récupère les données de l'étape PRÉCÉDENTE du livre que l'on a en main
                const prevData = books[bookOwnerId]['step' + (currentStep - 1)];
                
                if(currentStep % 2 === 1) {
                    title.innerText = `TOUR ${currentStep+1} : DESSIN`;
                    // Affiche l'auteur de l'étape précédente (currentStep - 1)
                    inst.innerHTML = `De <b>${prevData?.author || "Inconnu"}</b> : "${prevData?.content || "..."}"`;
                    document.getElementById('zone-draw').classList.remove('hidden');
                } else {
                    title.innerText = `TOUR ${currentStep+1} : DEVINETTE`;
                    // Affiche l'auteur de l'étape précédente (celui qui a fait le dessin)
                    inst.innerHTML = `Le dessin de <b>${prevData?.author || "Inconnu"}</b>`;
                    document.getElementById('img-to-guess').src = prevData?.content || "";
                    document.getElementById('zone-guess').classList.remove('hidden');
                }
            }
        }

        async function submitData(val) {
            const myIdx = players.indexOf(myId);
            const bookOwnerId = players[(myIdx - currentStep + players.length) % players.length];
            await set(ref(db, `scrum_phone/books/${bookOwnerId}/step${currentStep}`), { content: val, author: myName });
        }

        document.getElementById('btn-submit-write').onclick = () => submitData(document.getElementById('input-write').value || "...");
        document.getElementById('btn-submit-draw').onclick = () => submitData(canvas.toDataURL('image/png'));
        document.getElementById('btn-submit-guess').onclick = () => submitData(document.getElementById('input-guess').value || "...");

        document.getElementById('btn-start-game').onclick = () => {
            const dur = parseInt(document.getElementById('cfg-timer').value);
            update(ref(db, 'scrum_phone'), { state: "PLAYING", step: 0, timer: dur, maxTime: dur, books: null });
        };
        document.getElementById('btn-reset-all').onclick = () => { if(confirm("RESET?")) remove(ref(db, 'scrum_phone')); };

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let color = "#000";

        const palette = ["#000", "#7d4a03", "#f00", "#00f", "#0a0", "#ff0", "#f0f", "#ffa500", "#95a5a6", "#fff"];
        const palDiv = document.getElementById('palette');
        palette.forEach(c => {
            const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.background = c;
            dot.onclick = () => { 
                color = c; 
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
            };
            palDiv.appendChild(dot);
            if(c === "#000") dot.classList.add('active');
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function start(e) {
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = color;
            ctx.moveTo(pos.x, pos.y);
            if(e.cancelable) e.preventDefault();
        }

        function move(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if(e.cancelable) e.preventDefault();
        }

        function stop() {
            if (drawing) {
                ctx.closePath();
                drawing = false;
            }
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', stop);

        window.setEraser = () => { color = "#fff"; };
        window.clearCanvas = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); };

        function renderResults(books, playerList) {
            showScreen('screen-results');
            const gal = document.getElementById('results-gallery'); gal.innerHTML = "";
            players.forEach(pId => {
                const card = document.createElement('div'); card.className = 'result-card';
                let html = `<h3>Histoire de ${playerList[pId].name}</h3>`;
                for(let i=0; i < players.length; i++) {
                    const entry = books[pId] ? books[pId]['step'+i] : null;
                    if(!entry) continue;
                    if(i % 2 === 0) html += `<p><b>${entry.author}:</b> "${entry.content}"</p>`;
                    else html += `<p><b>${entry.author}:</b></p><img src="${entry.content}" style="width:100%; border:1px solid #eee">`;
                }
                card.innerHTML = html; gal.appendChild(card);
            });
        }

        setInterval(() => {
            if(isAdmin) {
                get(ref(db, 'scrum_phone')).then(s => {
                    const d = s.val();
                    if(d && d.state === "PLAYING" && d.timer > 0) update(ref(db, 'scrum_phone'), { timer: d.timer - 1 });
                });
            }
        }, 1000);
    </script>
</body>
</html>
